# DVC data-versioning pipeline for REACH.
#
# Public stages run from tracked lightweight snapshots. Full-data stages are
# intentionally explicit about their external archive dependencies.

stages:
  public_phase11:
    cmd: python scripts/phase11_statistics.py --from-snapshots --output-dir data/results/tables/phase11
    deps:
      - scripts/phase11_statistics.py
      - data/results/snapshots/paper_v1/results_per_unit.csv
      - data/results/snapshots/paper_v1/results_per_method.csv
      - data/results/snapshots/paper_v1/results_per_dataset.csv
      - data/results/snapshots/paper_v1/degenerate_predictions_report.csv
    outs:
      - data/results/tables/phase11/leaderboard.csv:
          cache: false
      - data/results/tables/phase11/rank_ci.csv:
          cache: false
      - data/results/tables/phase11/global_tests.csv:
          cache: false

  public_phase12:
    cmd: python scripts/reproduce_from_snapshots.py
    deps:
      - scripts/reproduce_from_snapshots.py
      - data/results/snapshots/paper_v1/results_per_unit.csv
      - data/results/snapshots/paper_v1/results_per_method.csv
      - data/results/snapshots/paper_v1/results_per_dataset.csv
      - data/results/tables/phase11/leaderboard.csv
    outs:
      - data/results/figures/phase12/Fig1_Leaderboard.png:
          cache: false
      - data/results/figures/phase12/Fig6_Runtime_Scalability_Pareto.png:
          cache: false

  toy_smoke:
    cmd: python scripts/run_all.py --toy
    deps:
      - scripts/run_all.py
      - scripts/create_toy_data.py
      - src/rarecellbenchmark
    outs:
      - data/toy/toy_expression.h5ad:
          cache: false
      - data/toy/toy_labels.parquet:
          cache: false

  full_data_phase11:
    cmd: python scripts/run_phase.py --phase 11
    deps:
      - scripts/run_phase.py
      - scripts/evaluate_results.py
      - data/predictions/.gitkeep
      - data/tracks/.gitkeep
    outs:
      - data/results/full_data_phase11.requires_archives:
          cache: false
